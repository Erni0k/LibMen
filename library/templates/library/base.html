<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LibMen</title>
    <style>
      body{font-family: Arial, sans-serif; margin:0; padding:0}
      .header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#f5f5f5;border-bottom:1px solid #ddd}
      .site-title{font-weight:700}
      .header-right a{margin-left:12px;text-decoration:none;color:#333}
      .container{padding:20px}
      .book{padding:12px;border-bottom:1px solid #eee}
      .meta{color:#666;font-size:0.9em}
    </style>
  </head>
  <body>
    <header class="header">
      <div class="site-title">LibMen</div>
      <div class="header-right">
        {% if user.is_authenticated %}
          Hello, {{ user.username }} |
          <form method="post" action="{% url 'library:logout' %}" style="display:inline">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;padding:0;margin:0;color:#333;cursor:pointer;">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'library:login' %}">Login</a>
        {% endif %}
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
